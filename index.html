<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muffin Mode</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #0a0a0a;
    cursor: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #title {
    position: fixed;
    top: 12px;
    left: 16px;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.18);
    pointer-events: none;
    z-index: 10;
    user-select: none;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,5,5,0.97);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #overlay span {
    font-family: system-ui, sans-serif;
    font-size: 28px;
    color: rgba(255,255,255,0.7);
    text-align: center;
    line-height: 1.5;
    user-select: none;
  }
</style>
</head>
<body>
<div id="overlay"><span>&#x1F431; Tap to start Muffin Mode</span></div>
<div id="title">&#x1F431; Muffin Mode</div>
<canvas id="c"></canvas>
<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');

  function resize() {
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const W = () => window.innerWidth;
  const H = () => window.innerHeight;

  // ─── Utilities ───
  function rand(a, b) { return a + Math.random() * (b - a); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  // ─── Web Audio: Cat-Attracting Sounds ───
  let audioCtx = null;

  function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  // High-pitched chirp/click (bird-like prey sound)
  function playChirp() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const clickCount = Math.floor(rand(2, 6));
    for (let i = 0; i < clickCount; i++) {
      const t = now + i * rand(0.04, 0.09);
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(rand(3200, 5500), t);
      osc.frequency.exponentialRampToValueAtTime(rand(1800, 3000), t + 0.03);
      filter.type = 'bandpass';
      filter.frequency.value = 4000;
      filter.Q.value = 8;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(rand(0.08, 0.18), t + 0.004);
      gain.gain.exponentialRampToValueAtTime(0.001, t + rand(0.025, 0.06));
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.08);
    }
  }

  // High-frequency squeak
  function playSqueak() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    const startFreq = rand(5000, 8000);
    osc.frequency.setValueAtTime(startFreq, now);
    osc.frequency.exponentialRampToValueAtTime(startFreq * rand(0.5, 0.8), now + 0.15);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(rand(0.04, 0.1), now + 0.01);
    gain.gain.setValueAtTime(rand(0.04, 0.1), now + 0.04);
    gain.gain.exponentialRampToValueAtTime(0.001, now + rand(0.08, 0.18));
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.25);
  }

  // Scratching/rustling noise (played when laser moves fast)
  let scratchNode = null;
  let scratchGain = null;

  function initScratchNoise() {
    if (!audioCtx) return;
    const bufferSize = audioCtx.sampleRate * 2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1);
    }
    scratchNode = audioCtx.createBufferSource();
    scratchNode.buffer = buffer;
    scratchNode.loop = true;

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 6000;
    filter.Q.value = 2.5;

    const filter2 = audioCtx.createBiquadFilter();
    filter2.type = 'highpass';
    filter2.frequency.value = 3000;

    scratchGain = audioCtx.createGain();
    scratchGain.gain.value = 0;

    scratchNode.connect(filter);
    filter.connect(filter2);
    filter2.connect(scratchGain);
    scratchGain.connect(audioCtx.destination);
    scratchNode.start();
  }

  function updateScratchVolume(speed) {
    if (!scratchGain) return;
    // Map speed to volume: fast movement = louder scratching
    const vol = clamp((speed - 4) / 12, 0, 1) * 0.06;
    scratchGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.05);
  }

  // Schedule intermittent chirps and squeaks
  let nextChirp = 0;
  let nextSqueak = 0;

  function scheduleSounds(now) {
    if (now > nextChirp) {
      playChirp();
      nextChirp = now + rand(2000, 5000);
    }
    if (now > nextSqueak) {
      playSqueak();
      nextSqueak = now + rand(4000, 9000);
    }
  }

  // ─── Laser Dot ───
  const laser = {
    x: 0, y: 0,
    tx: 0, ty: 0,
    prevX: 0, prevY: 0,
    trail: [],
    nextChange: 0,
    speed: 3,
    jitterAmp: 1.5,
    init() {
      this.x = W() / 2;
      this.y = H() / 2;
      this.prevX = this.x;
      this.prevY = this.y;
      this.pickTarget();
      this.trail = [];
    },
    pickTarget() {
      this.tx = rand(40, W() - 40);
      this.ty = rand(40, H() - 40);
      this.speed = rand(1.5, 8);
      this.nextChange = performance.now() + rand(400, 2200);
      this.jitterAmp = rand(0.5, 3);
    },
    update(dt) {
      const now = performance.now();
      this.prevX = this.x;
      this.prevY = this.y;

      if (now > this.nextChange) this.pickTarget();

      // Sudden burst behavior
      if (Math.random() < 0.008) {
        this.tx = rand(30, W() - 30);
        this.ty = rand(30, H() - 30);
        this.speed = rand(6, 14);
        this.nextChange = now + rand(200, 600);
      }

      // Zigzag / circle micro-patterns
      const pattern = Math.sin(now * 0.003) * 0.5;
      const dx = this.tx - this.x + Math.sin(now * 0.008) * 30 * pattern;
      const dy = this.ty - this.y + Math.cos(now * 0.006) * 30 * pattern;
      const d = Math.max(1, Math.hypot(dx, dy));
      const ease = Math.min(1, this.speed * dt / d);

      this.x += dx * ease + (Math.random() - 0.5) * this.jitterAmp;
      this.y += dy * ease + (Math.random() - 0.5) * this.jitterAmp;
      this.x = clamp(this.x, 5, W() - 5);
      this.y = clamp(this.y, 5, H() - 5);

      this.trail.push({ x: this.x, y: this.y, t: now });
      while (this.trail.length > 0 && now - this.trail[0].t > 600) this.trail.shift();

      // Compute instantaneous speed for scratch sound
      const moveSpeed = Math.hypot(this.x - this.prevX, this.y - this.prevY) / Math.max(dt, 0.1);
      updateScratchVolume(moveSpeed);

      // Schedule chirps/squeaks
      scheduleSounds(now);
    },
    draw() {
      const now = performance.now();

      // Trail
      for (let i = 1; i < this.trail.length; i++) {
        const p = this.trail[i];
        const age = (now - p.t) / 600;
        ctx.beginPath();
        ctx.arc(p.x, p.y, lerp(3, 0.5, age), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,30,20,${(1 - age) * 0.25})`;
        ctx.fill();
      }

      // Outer glow
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 28);
      grad.addColorStop(0, 'rgba(255,60,40,0.5)');
      grad.addColorStop(0.4, 'rgba(255,20,10,0.15)');
      grad.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.beginPath();
      ctx.arc(this.x, this.y, 28, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Inner dot
      const r = 5 + Math.sin(now * 0.02) * 1.5;
      ctx.beginPath();
      ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
      ctx.fillStyle = '#ff3322';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(this.x, this.y, r * 0.45, 0, Math.PI * 2);
      ctx.fillStyle = '#ffaaaa';
      ctx.fill();
    }
  };

  // ─── Start everything on tap/click ───
  function startApp() {
    overlay.style.display = 'none';
    initAudio();
    initScratchNoise();
    nextChirp = performance.now() + rand(500, 2000);
    nextSqueak = performance.now() + rand(3000, 6000);
    laser.init();
    requestAnimationFrame(frame);
  }

  overlay.addEventListener('click', startApp, { once: true });
  overlay.addEventListener('touchend', function(e) {
    e.preventDefault();
    startApp();
  }, { once: true });

  // ─── Main Loop ───
  let lastTime = performance.now();

  function frame(now) {
    const dt = Math.min((now - lastTime) / 16.667, 3);
    lastTime = now;

    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W(), H());

    laser.update(dt);
    laser.draw();

    requestAnimationFrame(frame);
  }
})();
</script>
</body>
</html>
