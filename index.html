<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muffin Mode</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #0a0a0a;
    cursor: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #title {
    position: fixed;
    top: 12px;
    left: 16px;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.18);
    pointer-events: none;
    z-index: 10;
    user-select: none;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,5,5,0.97);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #overlay span {
    font-family: system-ui, sans-serif;
    font-size: 28px;
    color: rgba(255,255,255,0.7);
    text-align: center;
    line-height: 1.5;
    user-select: none;
  }
</style>
</head>
<body>
<div id="overlay"><span>&#x1F431; Tap to start Muffin Mode</span></div>
<div id="title">&#x1F431; Muffin Mode</div>
<canvas id="c"></canvas>
<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');

  function resize() {
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const W = () => window.innerWidth;
  const H = () => window.innerHeight;

  // ─── Utilities ───
  function rand(a, b) { return a + Math.random() * (b - a); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  // ─── Dot sizes (bigger for mobile) ───
  const DOT_RADIUS = 18;
  const GLOW_MIN = 40;
  const GLOW_MAX = 70;

  // ─── Edge bounce margin ───
  const EDGE_MARGIN = 8;

  // ─── Web Audio: Cat-Attracting Sounds (5000-8000 Hz range) ───
  let audioCtx = null;

  function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  // High-pitched chirp/click — played during burst movements
  function playChirp() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const clickCount = Math.floor(rand(2, 6));
    for (let i = 0; i < clickCount; i++) {
      const t = now + i * rand(0.04, 0.09);
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(rand(5000, 7500), t);
      osc.frequency.exponentialRampToValueAtTime(rand(5500, 8000), t + 0.03);
      filter.type = 'bandpass';
      filter.frequency.value = 6500;
      filter.Q.value = 8;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(rand(0.08, 0.18), t + 0.004);
      gain.gain.exponentialRampToValueAtTime(0.001, t + rand(0.025, 0.06));
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.08);
    }
  }

  // Louder squeak — played on sudden direction changes
  function playSqueak() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    const startFreq = rand(6000, 8000);
    osc.frequency.setValueAtTime(startFreq, now);
    osc.frequency.exponentialRampToValueAtTime(startFreq * rand(0.6, 0.85), now + 0.15);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(rand(0.10, 0.20), now + 0.01);
    gain.gain.setValueAtTime(rand(0.10, 0.20), now + 0.04);
    gain.gain.exponentialRampToValueAtTime(0.001, now + rand(0.08, 0.18));
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.25);
  }

  // "Caught" reward: descending sequence of 5 high-pitched squeaks (8000→3000 Hz)
  function playDeathSound() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    for (let i = 0; i < 5; i++) {
      const t = now + i * 0.09;
      const freq = 8000 - i * 1000; // 8000, 7000, 6000, 5000, 4000→3000
      const endFreq = freq - 1000;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.exponentialRampToValueAtTime(Math.max(endFreq, 3000), t + 0.07);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.2, t + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.1);
    }
  }

  // Sharp high-pitched burst — played when dot flees from touch
  function playFleeSound() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(7000, now);
    osc.frequency.exponentialRampToValueAtTime(9000, now + 0.03);
    osc.frequency.exponentialRampToValueAtTime(5000, now + 0.1);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.15, now + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.15);
  }

  // Soft rustling noise — plays during slow stalk mode
  let rustleNode = null;
  let rustleGain = null;

  function initRustleNoise() {
    if (!audioCtx) return;
    const bufferSize = audioCtx.sampleRate * 2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1);
    }
    rustleNode = audioCtx.createBufferSource();
    rustleNode.buffer = buffer;
    rustleNode.loop = true;

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 6500;
    filter.Q.value = 3;

    const filter2 = audioCtx.createBiquadFilter();
    filter2.type = 'highpass';
    filter2.frequency.value = 5000;

    rustleGain = audioCtx.createGain();
    rustleGain.gain.value = 0;

    rustleNode.connect(filter);
    filter.connect(filter2);
    filter2.connect(rustleGain);
    rustleGain.connect(audioCtx.destination);
    rustleNode.start();
  }

  function setRustleVolume(vol) {
    if (!rustleGain || !audioCtx) return;
    rustleGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.08);
  }

  // ─── Movement State Machine ───
  const STATE_STALK = 'stalk';
  const STATE_BURST = 'burst';
  const STATE_FREEZE = 'freeze';
  const STATE_CORNER_CREEP = 'corner_creep';
  const STATE_CORNER_PAUSE = 'corner_pause';
  const STATE_CORNER_DART = 'corner_dart';
  const STATE_DYING = 'dying';
  const STATE_DEAD = 'dead';
  const STATE_RESPAWNING = 'respawning';
  const STATE_FLEEING = 'fleeing';

  // ─── Primary Laser Dot ───
  const laser = {
    x: 0, y: 0,
    tx: 0, ty: 0,
    prevX: 0, prevY: 0,
    prevDx: 0, prevDy: 0,
    trail: [],
    state: STATE_STALK,
    stateEnd: 0,
    stalkWobblePhase: 0,
    nextCornerTime: 0,
    cornerTarget: null,
    burstChirpTimer: 0,
    // Death animation state
    nextDeathTime: 0,
    deathStartTime: 0,
    deathScale: 1,       // 1 = full size, 0 = dead
    deadDuration: 800,    // ms to stay dead before respawn
    dyingDuration: 1500,  // ms of wobble + shrink
    respawnScale: 0,      // for pop-in effect
    // Flee state
    fleeVx: 0,
    fleeVy: 0,

    init() {
      this.x = W() / 2;
      this.y = H() / 2;
      this.prevX = this.x;
      this.prevY = this.y;
      this.prevDx = 0;
      this.prevDy = 0;
      this.trail = [];
      this.state = STATE_STALK;
      this.deathScale = 1;
      this.respawnScale = 1;
      this.pickStalkTarget();
      this.stateEnd = performance.now() + rand(2000, 5000);
      this.nextCornerTime = performance.now() + rand(20000, 30000);
      this.nextDeathTime = performance.now() + rand(45000, 60000);
      this.burstChirpTimer = 0;
    },

    pickStalkTarget() {
      this.tx = rand(60, W() - 60);
      this.ty = rand(60, H() - 60);
    },

    pickBurstTarget() {
      this.tx = rand(40, W() - 40);
      this.ty = rand(40, H() - 40);
    },

    pickCornerTarget() {
      const corners = [
        { x: rand(10, 40), y: rand(10, 40) },
        { x: rand(W() - 40, W() - 10), y: rand(10, 40) },
        { x: rand(10, 40), y: rand(H() - 40, H() - 10) },
        { x: rand(W() - 40, W() - 10), y: rand(H() - 40, H() - 10) },
        // Edge midpoints
        { x: rand(W() * 0.3, W() * 0.7), y: rand(5, 15) },
        { x: rand(W() * 0.3, W() * 0.7), y: rand(H() - 15, H() - 5) },
        { x: rand(5, 15), y: rand(H() * 0.3, H() * 0.7) },
        { x: rand(W() - 15, W() - 5), y: rand(H() * 0.3, H() * 0.7) },
      ];
      this.cornerTarget = corners[Math.floor(Math.random() * corners.length)];
      this.tx = this.cornerTarget.x;
      this.ty = this.cornerTarget.y;
    },

    // Flee away from a touch point
    fleeFrom(touchX, touchY) {
      if (this.state === STATE_DYING || this.state === STATE_DEAD || this.state === STATE_RESPAWNING) return;
      const dx = this.x - touchX;
      const dy = this.y - touchY;
      const d = Math.max(1, Math.hypot(dx, dy));
      // Flee in opposite direction at max speed
      const fleeSpeed = 25;
      this.fleeVx = (dx / d) * fleeSpeed;
      this.fleeVy = (dy / d) * fleeSpeed;
      this.state = STATE_FLEEING;
      this.stateEnd = performance.now() + rand(300, 600);
      playFleeSound();
    },

    transitionState(now) {
      // Check for death animation
      if (now > this.nextDeathTime && this.state !== STATE_DYING &&
          this.state !== STATE_DEAD && this.state !== STATE_RESPAWNING &&
          this.state !== STATE_FLEEING) {
        this.state = STATE_DYING;
        this.deathStartTime = now;
        this.stateEnd = now + this.dyingDuration;
        this.nextDeathTime = now + rand(45000, 60000);
        return;
      }

      // Check for corner hiding behavior (every 20-30s)
      if (now > this.nextCornerTime && this.state !== STATE_CORNER_CREEP &&
          this.state !== STATE_CORNER_PAUSE && this.state !== STATE_CORNER_DART &&
          this.state !== STATE_DYING && this.state !== STATE_DEAD &&
          this.state !== STATE_RESPAWNING && this.state !== STATE_FLEEING) {
        this.state = STATE_CORNER_CREEP;
        this.pickCornerTarget();
        this.stateEnd = now + rand(3000, 5000);
        this.nextCornerTime = now + rand(20000, 30000);
        return;
      }

      switch (this.state) {
        case STATE_STALK:
          if (Math.random() < 0.20) {
            this.state = STATE_FREEZE;
            this.stateEnd = now + rand(400, 600);
          } else {
            this.state = STATE_BURST;
            this.pickBurstTarget();
            this.stateEnd = now + rand(500, 1000);
            this.burstChirpTimer = 0;
            playChirp();
          }
          break;

        case STATE_BURST:
          this.state = STATE_STALK;
          this.pickStalkTarget();
          this.stateEnd = now + rand(2500, 6000);
          break;

        case STATE_FREEZE:
          this.state = STATE_BURST;
          this.pickBurstTarget();
          this.stateEnd = now + rand(500, 1000);
          this.burstChirpTimer = 0;
          playChirp();
          playSqueak();
          break;

        case STATE_CORNER_CREEP:
          this.state = STATE_CORNER_PAUSE;
          this.stateEnd = now + rand(1000, 2000);
          break;

        case STATE_CORNER_PAUSE:
          this.state = STATE_CORNER_DART;
          this.tx = rand(W() * 0.3, W() * 0.7);
          this.ty = rand(H() * 0.3, H() * 0.7);
          this.stateEnd = now + rand(400, 800);
          playSqueak();
          playChirp();
          break;

        case STATE_CORNER_DART:
          this.state = STATE_STALK;
          this.pickStalkTarget();
          this.stateEnd = now + rand(2500, 5000);
          break;

        case STATE_DYING:
          // Dot has finished dying — go to dead state
          this.state = STATE_DEAD;
          this.deathScale = 0;
          playDeathSound();
          this.stateEnd = now + this.deadDuration;
          break;

        case STATE_DEAD:
          // Respawn at random position
          this.state = STATE_RESPAWNING;
          this.x = rand(80, W() - 80);
          this.y = rand(80, H() - 80);
          this.respawnScale = 0;
          this.trail = [];
          this.stateEnd = now + 300; // pop-in duration
          break;

        case STATE_RESPAWNING:
          // Done respawning, back to stalk
          this.deathScale = 1;
          this.respawnScale = 1;
          this.state = STATE_STALK;
          this.pickStalkTarget();
          this.stateEnd = now + rand(2500, 5000);
          break;

        case STATE_FLEEING:
          // Done fleeing, back to stalk/burst
          this.state = STATE_BURST;
          this.pickBurstTarget();
          this.stateEnd = now + rand(500, 1000);
          this.burstChirpTimer = 0;
          playChirp();
          break;
      }
    },

    update(dt) {
      const now = performance.now();
      this.prevX = this.x;
      this.prevY = this.y;

      if (now > this.stateEnd) this.transitionState(now);

      let speed, jitter;
      switch (this.state) {
        case STATE_STALK:
        case STATE_CORNER_CREEP: {
          speed = rand(1.0, 2.0);
          jitter = 0.8;
          this.stalkWobblePhase += dt * 0.08;
          const wobbleX = Math.sin(this.stalkWobblePhase * 2.3) * 1.5;
          const wobbleY = Math.cos(this.stalkWobblePhase * 1.7) * 1.5;
          const sdx = this.tx - this.x + wobbleX;
          const sdy = this.ty - this.y + wobbleY;
          const sd = Math.max(1, Math.hypot(sdx, sdy));
          const sease = Math.min(1, speed * dt / sd);
          this.x += sdx * sease + (Math.random() - 0.5) * jitter;
          this.y += sdy * sease + (Math.random() - 0.5) * jitter;
          setRustleVolume(0.025);
          break;
        }

        case STATE_BURST:
        case STATE_CORNER_DART: {
          speed = rand(10, 18);
          jitter = 2.5;
          const bdx = this.tx - this.x;
          const bdy = this.ty - this.y;
          const bd = Math.max(1, Math.hypot(bdx, bdy));
          const bease = Math.min(1, speed * dt / bd);
          this.x += bdx * bease + (Math.random() - 0.5) * jitter;
          this.y += bdy * bease + (Math.random() - 0.5) * jitter;
          this.burstChirpTimer += dt * 16.667;
          if (this.burstChirpTimer > rand(150, 300)) {
            playChirp();
            this.burstChirpTimer = 0;
          }
          setRustleVolume(0);
          break;
        }

        case STATE_FREEZE:
          setRustleVolume(0);
          break;

        case STATE_CORNER_PAUSE:
          this.x += (Math.random() - 0.5) * 0.3;
          this.y += (Math.random() - 0.5) * 0.3;
          setRustleVolume(0.01);
          break;

        case STATE_DYING: {
          // Wobble frantically, increasing in intensity, then shrink
          const elapsed = now - this.deathStartTime;
          const progress = elapsed / this.dyingDuration; // 0→1
          // Wobble intensity increases over time
          const wobbleIntensity = 3 + progress * 12;
          this.x += (Math.random() - 0.5) * wobbleIntensity;
          this.y += (Math.random() - 0.5) * wobbleIntensity;
          // Shrink from 1 to 0 in last 40% of dying duration
          if (progress > 0.6) {
            this.deathScale = Math.max(0, 1 - (progress - 0.6) / 0.4);
          } else {
            this.deathScale = 1;
          }
          setRustleVolume(0);
          break;
        }

        case STATE_DEAD:
          // Invisible, no movement
          this.deathScale = 0;
          setRustleVolume(0);
          break;

        case STATE_RESPAWNING: {
          // Pop-in: scale from 0 to 1
          const rElapsed = now - (this.stateEnd - 300);
          this.respawnScale = clamp(rElapsed / 300, 0, 1);
          // Overshoot bounce effect
          this.deathScale = this.respawnScale < 1
            ? this.respawnScale * (1 + 0.3 * Math.sin(this.respawnScale * Math.PI))
            : 1;
          setRustleVolume(0);
          break;
        }

        case STATE_FLEEING: {
          // Move at max speed away from touch
          this.x += this.fleeVx * dt;
          this.y += this.fleeVy * dt;
          // Decelerate slightly
          this.fleeVx *= 0.96;
          this.fleeVy *= 0.96;
          setRustleVolume(0);
          break;
        }
      }

      // ─── Constant micro-jitter (±2px every frame, simulates hand tremor) ───
      if (this.state !== STATE_DEAD && this.state !== STATE_RESPAWNING) {
        this.x += (Math.random() - 0.5) * 4; // ±2px
        this.y += (Math.random() - 0.5) * 4;
      }

      // ─── Edge bounce ───
      if (this.state !== STATE_DEAD && this.state !== STATE_RESPAWNING) {
        let bounced = false;
        if (this.x < EDGE_MARGIN) {
          this.x = EDGE_MARGIN;
          if (this.state === STATE_FLEEING) this.fleeVx = Math.abs(this.fleeVx);
          this.tx = rand(W() * 0.3, W() * 0.7);
          bounced = true;
        } else if (this.x > W() - EDGE_MARGIN) {
          this.x = W() - EDGE_MARGIN;
          if (this.state === STATE_FLEEING) this.fleeVx = -Math.abs(this.fleeVx);
          this.tx = rand(W() * 0.3, W() * 0.7);
          bounced = true;
        }
        if (this.y < EDGE_MARGIN) {
          this.y = EDGE_MARGIN;
          if (this.state === STATE_FLEEING) this.fleeVy = Math.abs(this.fleeVy);
          this.ty = rand(H() * 0.3, H() * 0.7);
          bounced = true;
        } else if (this.y > H() - EDGE_MARGIN) {
          this.y = H() - EDGE_MARGIN;
          if (this.state === STATE_FLEEING) this.fleeVy = -Math.abs(this.fleeVy);
          this.ty = rand(H() * 0.3, H() * 0.7);
          bounced = true;
        }
        // Brief speed burst on bounce
        if (bounced && this.state !== STATE_DYING && this.state !== STATE_FLEEING) {
          this.state = STATE_BURST;
          this.stateEnd = performance.now() + rand(300, 500);
          this.burstChirpTimer = 0;
          playSqueak();
        }
      }

      // Detect sudden direction change → squeak
      const curDx = this.x - this.prevX;
      const curDy = this.y - this.prevY;
      if (this.prevDx !== 0 || this.prevDy !== 0) {
        const dot = curDx * this.prevDx + curDy * this.prevDy;
        const mag = Math.hypot(curDx, curDy) * Math.hypot(this.prevDx, this.prevDy);
        if (mag > 2 && dot / mag < -0.3) {
          playSqueak();
        }
      }
      this.prevDx = curDx;
      this.prevDy = curDy;

      // Trail
      if (this.state !== STATE_DEAD) {
        this.trail.push({ x: this.x, y: this.y, t: now });
      }
      while (this.trail.length > 0 && now - this.trail[0].t > 600) this.trail.shift();
    },

    draw() {
      if (this.state === STATE_DEAD) return;
      drawDot(this.x, this.y, this.trail, 1.0, this.deathScale);
    }
  };

  // ─── Second Dot (occasional) ───
  const secondDot = {
    active: false,
    x: 0, y: 0,
    tx: 0, ty: 0,
    trail: [],
    opacity: 0,
    spawnTime: 0,
    duration: 0,
    nextSpawn: 0,

    init() {
      this.active = false;
      this.trail = [];
      this.nextSpawn = performance.now() + rand(30000, 45000);
    },

    spawn(now) {
      this.active = true;
      this.x = clamp(laser.x + rand(-100, 100), 30, W() - 30);
      this.y = clamp(laser.y + rand(-100, 100), 30, H() - 30);
      this.pickTarget();
      this.trail = [];
      this.opacity = 0;
      this.spawnTime = now;
      this.duration = rand(3000, 5000);
      this.nextSpawn = now + rand(30000, 45000);
    },

    pickTarget() {
      this.tx = rand(60, W() - 60);
      this.ty = rand(60, H() - 60);
    },

    update(dt) {
      const now = performance.now();

      if (!this.active) {
        if (now > this.nextSpawn) this.spawn(now);
        return;
      }

      const elapsed = now - this.spawnTime;

      if (elapsed < 300) {
        this.opacity = elapsed / 300;
      } else if (elapsed > this.duration - 800) {
        this.opacity = Math.max(0, (this.duration - elapsed) / 800);
      } else {
        this.opacity = 1;
      }

      if (elapsed > this.duration) {
        this.active = false;
        this.trail = [];
        return;
      }

      if (Math.random() < 0.015) {
        this.pickTarget();
      }

      const speed = rand(2, 6);
      const dx = this.tx - this.x + Math.sin(now * 0.005) * 15;
      const dy = this.ty - this.y + Math.cos(now * 0.004) * 15;
      const d = Math.max(1, Math.hypot(dx, dy));
      const ease = Math.min(1, speed * dt / d);
      this.x += dx * ease + (Math.random() - 0.5) * 1.2;
      this.y += dy * ease + (Math.random() - 0.5) * 1.2;

      // Micro-jitter for second dot too
      this.x += (Math.random() - 0.5) * 4;
      this.y += (Math.random() - 0.5) * 4;

      this.x = clamp(this.x, 3, W() - 3);
      this.y = clamp(this.y, 3, H() - 3);

      this.trail.push({ x: this.x, y: this.y, t: now });
      while (this.trail.length > 0 && now - this.trail[0].t > 600) this.trail.shift();
    },

    draw() {
      if (!this.active || this.opacity <= 0) return;
      drawDot(this.x, this.y, this.trail, this.opacity, 1);
    }
  };

  // ─── Shared dot drawing with pulsing glow and death scale ───
  function drawDot(x, y, trail, opacity, scale) {
    if (scale <= 0) return;
    const now = performance.now();

    // Flicker during death (rapid opacity oscillation when scale < 0.5)
    let flickerOpacity = opacity;
    if (scale < 0.5 && scale > 0) {
      flickerOpacity *= (Math.sin(now * 0.08) > 0) ? 1 : 0.2;
    }

    // Trail
    for (let i = 1; i < trail.length; i++) {
      const p = trail[i];
      const age = (now - p.t) / 600;
      ctx.beginPath();
      ctx.arc(p.x, p.y, lerp(DOT_RADIUS * 0.4, 1, age) * scale, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,30,20,${(1 - age) * 0.25 * flickerOpacity})`;
      ctx.fill();
    }

    // ─── Pulsing glow: sine wave between GLOW_MIN and GLOW_MAX at ~2.5 cycles/sec ───
    const glowPulse = Math.sin(now * 0.016) * 0.5 + 0.5; // 0→1 at ~2.5Hz (0.016 rad/ms ≈ 2.55 Hz)
    const currentGlow = lerp(GLOW_MIN, GLOW_MAX, glowPulse) * scale;

    const grad = ctx.createRadialGradient(x, y, 0, x, y, currentGlow);
    grad.addColorStop(0, `rgba(255,60,40,${0.5 * flickerOpacity})`);
    grad.addColorStop(0.33, `rgba(255,20,10,${0.15 * flickerOpacity})`);
    grad.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.beginPath();
    ctx.arc(x, y, currentGlow, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Inner dot (18px radius with pulse) — scaled
    const r = (DOT_RADIUS + Math.sin(now * 0.02) * 2) * scale;
    ctx.beginPath();
    ctx.arc(x, y, Math.max(0.5, r), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,51,34,${flickerOpacity})`;
    ctx.fill();

    // Bright center
    ctx.beginPath();
    ctx.arc(x, y, Math.max(0.25, r * 0.45), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,170,170,${flickerOpacity})`;
    ctx.fill();
  }

  // ─── Touch/click reactive fleeing ───
  let appStarted = false;

  function handleTouch(ex, ey) {
    if (!appStarted) return;
    laser.fleeFrom(ex, ey);
  }

  canvas.addEventListener('mousedown', function(e) {
    handleTouch(e.clientX, e.clientY);
  });

  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    const touch = e.touches[0];
    if (touch) handleTouch(touch.clientX, touch.clientY);
  }, { passive: false });

  // ─── Start everything on tap/click ───
  function startApp() {
    overlay.style.display = 'none';
    appStarted = true;
    initAudio();
    initRustleNoise();
    laser.init();
    secondDot.init();
    requestAnimationFrame(frame);
  }

  overlay.addEventListener('click', startApp, { once: true });
  overlay.addEventListener('touchend', function(e) {
    e.preventDefault();
    startApp();
  }, { once: true });

  // ─── Main Loop ───
  let lastTime = performance.now();

  function frame(now) {
    const dt = Math.min((now - lastTime) / 16.667, 3);
    lastTime = now;

    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W(), H());

    laser.update(dt);
    secondDot.update(dt);

    laser.draw();
    secondDot.draw();

    requestAnimationFrame(frame);
  }
})();
</script>
</body>
</html>
